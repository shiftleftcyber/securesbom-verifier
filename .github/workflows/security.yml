name: Security

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * 1"
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    env:
      GOEXPERIMENT: jsonv2
      GOVULNCHECK_SCAN: package
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        shell: bash
        run: |
          export PATH="$(go env GOPATH)/bin:${PATH}"
          set +e
          make vulncheck
          status=$?
          set -e

          if [ "${status}" -ne 0 ]; then
            echo "::warning title=govulncheck reported issues::govulncheck exited with status ${status}. Review the log output for vulnerabilities or scan errors."
          fi

  dependency-review:
    name: Dependency Review
    # Dependency Review works for public repos by default, but private repos need
    # GitHub Code Security / Advanced Security enabled at the repo or org level.
    if: github.event_name == 'pull_request' && github.event.repository.private == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Dependency review
        uses: actions/dependency-review-action@v4

  codeql:
    name: CodeQL
    # CodeQL works for public repos by default, but private repos need
    # GitHub Code Security / Advanced Security enabled at the repo or org level.
    if: github.event.repository.private == false
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language:
          - go
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3.35.2
        with:
          languages: ${{ matrix.language }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Autobuild
        env:
          GOEXPERIMENT: jsonv2
        run: make build-cli

      - name: Analyze
        uses: github/codeql-action/analyze@v3.35.2
